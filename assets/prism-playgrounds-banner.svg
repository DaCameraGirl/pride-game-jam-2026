<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Prism Playgrounds animated Pride banner</title>
  <desc id="desc">A sparkly animated Pride color banner for Prism Playgrounds.</desc>
  <defs>
    <linearGradient id="pride" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e40303"/>
      <stop offset="16%" stop-color="#ff8c00"/>
      <stop offset="32%" stop-color="#ffed00"/>
      <stop offset="48%" stop-color="#008026"/>
      <stop offset="64%" stop-color="#2447ff"/>
      <stop offset="80%" stop-color="#732982"/>
      <stop offset="100%" stop-color="#ff6fb5"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1.2 0" dur="4.8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="34" fill="#14131d"/>
  <rect x="20" y="20" width="1160" height="280" rx="26" fill="url(#pride)" opacity="0.92"/>
  <rect x="20" y="20" width="1160" height="280" rx="26" fill="url(#shine)" opacity="0.7"/>

  <g opacity="0.18">
    <rect x="70" y="54" width="1060" height="28" rx="14" fill="#fff"/>
    <rect x="70" y="238" width="1060" height="28" rx="14" fill="#fff"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="108" cy="92" r="5" fill="#fff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;7;3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="232" cy="222" r="4" fill="#fff">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;6;2" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="436" cy="78" r="4" fill="#fff">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="1.7s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;6;2" dur="1.7s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="746" cy="236" r="5" fill="#fff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;8;3" dur="2.4s" begin="0.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1004" cy="90" r="5" fill="#fff">
      <animate attributeName="opacity" values="0.15;0.95;0.15" dur="1.9s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;7;3" dur="1.9s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M1112 214 l9 21 22 8 -22 8 -9 21 -9 -21 -22 -8 22 -8z" fill="#fff">
      <animate attributeName="opacity" values="0.22;1;0.22" dur="2.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 1112 243; 25 1112 243; 0 1112 243" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M151 164 l7 16 17 7 -17 7 -7 16 -7 -16 -17 -7 17 -7z" fill="#fff">
      <animate attributeName="opacity" values="0.18;0.92;0.18" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 151 187; -22 151 187; 0 151 187" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="Trebuchet MS, Gill Sans, Segoe UI, sans-serif" text-anchor="middle">
    <text x="600" y="145" fill="#14131d" opacity="0.22" font-size="72" font-weight="900">PRISM PLAYGROUNDS</text>
    <text x="600" y="137" fill="#fffaf2" font-size="72" font-weight="900">PRISM PLAYGROUNDS</text>
    <text x="600" y="190" fill="#fffaf2" font-size="25" font-weight="800" opacity="0.95">Pride Game Jam 2026 mini-game arcade</text>
  </g>
</svg>
