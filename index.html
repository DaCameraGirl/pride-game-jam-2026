<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prism Playgrounds | Pride Game Jam 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="skip-link" href="#playArea">Skip to game</a>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <p class="eyebrow">Pride Game Jam 2026</p>
          <h1>Prism Playgrounds</h1>
        </div>
      </div>
      <nav class="mode-tabs" aria-label="Choose a mini-game">
        <button class="mode-tab is-active" type="button" data-mode="parade">
          <span class="tab-number">01</span>
          Parade Catch
        </button>
        <button class="mode-tab" type="button" data-mode="builder">
          <span class="tab-number">02</span>
          Flag Builder
        </button>
        <button class="mode-tab" type="button" data-mode="match">
          <span class="tab-number">03</span>
          Kindness Match
        </button>
      </nav>
    </header>

    <main class="game-layout">
      <section class="stage-panel" aria-labelledby="modeTitle">
        <div class="stage-header">
          <div>
            <p class="eyebrow" id="modeKicker">Mini-game 01</p>
            <h2 id="modeTitle">Parade Catch</h2>
          </div>
          <div class="stats" aria-label="Game stats">
            <div class="stat">
              <span>Score</span>
              <strong id="scoreValue">0</strong>
            </div>
            <div class="stat">
              <span>Time</span>
              <strong id="timeValue">45</strong>
            </div>
            <div class="stat">
              <span>Bonus</span>
              <strong id="bonusValue">0</strong>
            </div>
          </div>
        </div>

        <div class="play-area" id="playArea">
          <canvas id="gameCanvas" width="960" height="540" aria-label="Parade Catch canvas game"></canvas>
          <div class="dom-game is-hidden" id="domGame" aria-live="polite"></div>
        </div>

        <div class="touch-controls" id="touchControls" aria-label="Touch controls">
          <button type="button" data-control="left">Left</button>
          <button type="button" data-control="pulse">Pulse</button>
          <button type="button" data-control="right">Right</button>
        </div>
      </section>

      <aside class="control-panel" aria-label="Game controls and mission">
        <div class="mission">
          <p class="eyebrow">Current Goal</p>
          <h3 id="goalTitle">Catch the bright pieces.</h3>
          <p id="goalText">
            Move the parade cart, collect prism pieces, and use a pulse to clear gray blocks.
          </p>
        </div>

        <div class="actions">
          <button class="primary-action" id="startButton" type="button">Start Game</button>
          <button class="secondary-action" id="resetButton" type="button">Reset</button>
        </div>

        <div class="status-card">
          <p class="eyebrow">Status</p>
          <p id="statusText">Choose a mini-game, then press Start Game.</p>
        </div>

        <div class="mode-list" aria-label="Mini-game list">
          <button class="mode-card is-active" type="button" data-mode="parade">
            <span class="card-stripe parade"></span>
            <span>
              <strong>Parade Catch</strong>
              <small>Arcade catching game</small>
            </span>
          </button>
          <button class="mode-card" type="button" data-mode="builder">
            <span class="card-stripe builder"></span>
            <span>
              <strong>Flag Builder</strong>
              <small>Pattern puzzle game</small>
            </span>
          </button>
          <button class="mode-card" type="button" data-mode="match">
            <span class="card-stripe match"></span>
            <span>
              <strong>Kindness Match</strong>
              <small>Memory matching game</small>
            </span>
          </button>
        </div>
      </aside>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
